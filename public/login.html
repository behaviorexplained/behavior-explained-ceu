<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Behavior Explained</title>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #FC3526; --pink: #FAA1E4; --lime: #CEDD2E;
      --teal: #1ACBA3; --cyan: #1BBFD6; --bg: #FCF1F2; --dark: #1a1a1a;
    }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
    h1, h2, h3 { font-family: 'League Spartan', sans-serif; }
    nav {
      background: white; padding: 16px 40px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .nav-logo { text-decoration: none; display: flex; align-items: center; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card {
      background: white; border-radius: 24px; padding: 48px;
      width: 100%; max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }
    .card h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .card p { color: #666; margin-bottom: 32px; font-size: 15px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    input {
      width: 100%; padding: 14px 18px; border: 2px solid #eee;
      border-radius: 12px; font-size: 15px; font-family: 'Poppins', sans-serif;
      transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: var(--teal); }
    .btn {
      width: 100%; padding: 16px; background: var(--red); color: white;
      border: none; border-radius: 50px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Poppins', sans-serif;
      transition: opacity 0.2s; margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .error {
      background: #fff0f0; border: 2px solid #ffcdd2; color: var(--red);
      padding: 12px 16px; border-radius: 12px; margin-bottom: 20px;
      font-weight: 600; display: none; font-size: 14px;
    }
    .footer-text { text-align: center; margin-top: 24px; color: #666; font-size: 14px; }
    .footer-text a { color: var(--teal); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <img src="/Submark_1.png" alt="Behavior Explained" style="height:80px; width:auto;">
    </a>
  </nav>
  <div class="main">
    <div class="card">
      <h1>Welcome back 👋</h1>
      <p>Log in to access your CEU courses and certificates.</p>
      <div class="error" id="error"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn" onclick="login()">Log In</button>
      <p class="footer-text">Don't have an account? <a href="/signup">Sign up free</a></p>
    </div>
  </div>
  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.error) {
        const err = document.getElementById('error');
        err.textContent = data.error;
        err.style.display = 'block';
      } else {
        window.location.href = data.isAdmin ? '/admin' : '/dashboard';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
